{% extends "base.html" %}
{% block title %}Masuk — CineList{% endblock %}

{% block head %}
<style>
    /* Animated grain overlay */
    @keyframes grain {

        0%,
        100% {
            transform: translate(0, 0);
        }

        10% {
            transform: translate(-2%, -3%);
        }

        30% {
            transform: translate(3%, 2%);
        }

        50% {
            transform: translate(-1%, 4%);
        }

        70% {
            transform: translate(4%, -2%);
        }

        90% {
            transform: translate(-3%, 1%);
        }
    }

    .grain::after {
        content: "";
        position: fixed;
        inset: -50%;
        width: 200%;
        height: 200%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.15;
        pointer-events: none;
        animation: grain 8s steps(10) infinite;
        z-index: 0;
    }

    @keyframes float-up {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-float-up {
        animation: float-up 0.7s ease forwards;
    }

    .delay-1 {
        animation-delay: 0.1s;
        opacity: 0;
    }

    .delay-2 {
        animation-delay: 0.25s;
        opacity: 0;
    }

    .delay-3 {
        animation-delay: 0.4s;
        opacity: 0;
    }
</style>
{% endblock %}

{% block content %}
<!-- Full screen login layout -->
<div class="grain fixed inset-0 bg-dark-900 flex items-center justify-center overflow-hidden">

    <!-- Background decorative blobs -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-brand-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-brand-600/10 rounded-full blur-3xl pointer-events-none">
    </div>

    <!-- Card Login -->
    <div class="relative z-10 flex flex-col items-center gap-8 px-6 text-center">

        <!-- Logo -->
        <div class="animate-float-up delay-1">
            <h1 class="font-display text-5xl font-extrabold tracking-tight text-white">
                VAN<span class="text-brand-500">VID</span>
            </h1>
            <p class="mt-2 text-white/40 text-sm font-light tracking-widest uppercase">
                Your personal movie watchlist
            </p>
        </div>

        <!-- Divider dekoratif -->
        <div class="animate-float-up delay-2 flex items-center gap-3 w-48">
            <div class="flex-1 h-px bg-white/10"></div>
            <span class="text-white/20 text-xs">✦</span>
            <div class="flex-1 h-px bg-white/10"></div>
        </div>

        <!-- Tombol Login Google -->
        <div class="animate-float-up delay-3">
            <a href="{{ url_for('auth.auth_google') }}" class="glow group flex items-center gap-4 bg-white text-gray-800
                px-8 py-4 rounded-2xl font-medium text-sm
                hover:bg-brand-50 hover:scale-105
                transition-all duration-300 ease-out shadow-2xl">

                <!-- Google Icon SVG -->
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>

                <span class="group-hover:text-brand-600 transition-colors">
                    Masuk dengan Google
                </span>
            </a>

            <p class="mt-4 text-white/20 text-xs">
                Dengan masuk, kamu menyetujui penggunaan data akun Google kamu.
            </p>
        </div>

    </div>
</div>
{% endblock %}
